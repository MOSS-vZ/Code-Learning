<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在HTML里写CSS</title>
    <style>
        /* 在head标签里面嵌套style标签 */
        /* 格式为：选择器{CSS属性} */
        p {
            color: red;
            /* 属性名：属性值 */
            font-size: 38px;
        }

        /* 选择器为调整样式的对象，p就是段落标签 */
    </style>
</head>

<body>
    <p>效果</p>
</body>

</html>
