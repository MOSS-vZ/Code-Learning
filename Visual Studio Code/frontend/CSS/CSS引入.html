<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS引入</title>
    <!-- 外部引入用link标签 -->
    <link rel="stylesheet" href="./my.css">
</head>

<body>
    <p>红色的字</p>
    <!-- 还可以行内引用 -->
    <div style="color: green;">绿色的div标签</div>
    <!-- style属性里面写键值对 -->
</body>

</html>
